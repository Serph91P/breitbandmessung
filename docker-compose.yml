services:
  # ============================================
  # Speedtest Service - Führt automatische Messungen durch
  # ============================================
  speedtest:
    build: .
    image: breitbandmessung:latest
    container_name: breitbandmessung-speedtest
    restart: unless-stopped
    
    volumes:
      # CSV-Dateien werden hier gespeichert
      - ${EXPORT_PATH:-./messprotokolle}:/export
      # Config
      - ./config.ini:/usr/src/app/config/config.ini:ro
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Dashboard Service - Web-Interface für Analyse
  # ============================================
  dashboard:
    build: ./dashboard
    image: breitbandmessung-dashboard:latest
    container_name: breitbandmessung-dashboard
    restart: unless-stopped
    
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    
    volumes:
      # Messdaten (read-only)
      - ${EXPORT_PATH:-./messprotokolle}:/data:ro
    
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
