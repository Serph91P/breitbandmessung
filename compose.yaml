services:
  # ============================================
  # Speedtest Service - Automatische BNetzA Messungen
  # CSVs werden via shared Volume an DOCSight übergeben
  # ============================================
  speedtest:
    build: .
    image: ghcr.io/serph91p/breitbandmessung:latest
    container_name: breitbandmessung-speedtest
    restart: unless-stopped
    
    volumes:
      # Messprotokolle - lokale CSV-Kopie
      - messprotokolle:/export
      # Shared Volume für DOCSight BNetzA Import
      - bnetz_data:/export/docsight
    
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */2 * * *}
      - RUN_ON_STARTUP=${RUN_ON_STARTUP:-true}
      - RUN_ONCE=${RUN_ONCE:-false}
      - SAVE_SCREENSHOTS=${SAVE_SCREENSHOTS:-true}
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  messprotokolle:
    name: breitbandmessung-messprotokolle
  bnetz_data:
    name: shared-bnetz-data
